<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memories Vault - BoscoConnect 2025</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary-red: #C41E3A;
            --secondary-gold: #FFD700;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #f8f9fa;
        }
        .memories-container {
            max-width: 100%;
            min-height: 100vh;
            background: white;
        }
        .memories-header {
            background: linear-gradient(135deg, var(--primary-red), #A01029);
            color: white;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
        .memories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 8px;
            padding: 15px;
        }
        .memory-item {
            aspect-ratio: 1;
            background: #f0f0f0;
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }
        .memory-item:hover {
            transform: scale(1.05);
        }
        .memory-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .upload-btn {
            position: fixed;
            bottom: 90px;
            right: 20px;
            width: 55px;
            height: 55px;
            background: linear-gradient(135deg, var(--primary-red), #A01029);
            color: white;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-size: 24px;
            box-shadow: 0 5px 15px rgba(196, 30, 58, 0.3);
        }
        .loading {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="memories-container">
        <div class="memories-header">
            <div style="font-size: 24px; cursor: pointer;" onclick="history.back()">
                <i class="fas fa-arrow-left"></i>
            </div>
            <div style="flex: 1; font-size: 18px; font-weight: 700;">Memories Vault</div>
        </div>

        <div id="memoriesGrid" class="loading">
            <div style="width: 30px; height: 30px; border: 3px solid rgba(196, 30, 58, 0.2); border-top-color: var(--primary-red); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 15px;"></div>
            <p>Loading memories...</p>
        </div>
    </div>

    <button class="upload-btn" onclick="uploadMemory()">
        <i class="fas fa-camera"></i>
    </button>

    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js"></script>
    <script src="config/firebase-config.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadMemories();
        });

        function loadMemories() {
            const memoriesGrid = document.getElementById('memoriesGrid');
            memoriesGrid.innerHTML = '<div class="loading"><p>📸 Coming soon - Pinterest-style gallery for your school memories!</p></div>';
        }

        function uploadMemory() {
            alert('Upload memory feature coming soon!');
        }

        const style = document.createElement('style');
        style.textContent = `@keyframes spin { to { transform: rotate(360deg); } }`;
        document.head.appendChild(style);
    </script>
</body>
</html>
