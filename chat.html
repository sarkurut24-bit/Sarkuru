<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Chat - BoscoConnect 2025</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-red: #C41E3A;
            --secondary-gold: #FFD700;
            --dark-grey: #2C3E50;
            --light-grey: #ECF0F1;
            --accent-orange: #FF8C00;
            --text-dark: #1a1a1a;
            --text-light: #666666;
            --border-color: #dddddd;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f8f9fa;
        }

        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: white;
        }

        /* Header */
        .chat-header {
            background: linear-gradient(135deg, var(--primary-red), #A01029);
            color: white;
            padding: 15px 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            gap: 15px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .chat-header-back {
            font-size: 24px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .chat-header-back:hover {
            transform: scale(1.1);
        }

        .chat-header-title {
            flex: 1;
        }

        .chat-header-title h2 {
            font-size: 18px;
            margin-bottom: 2px;
        }

        .chat-header-subtitle {
            font-size: 12px;
            opacity: 0.9;
        }

        /* Messages Area */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scroll-behavior: smooth;
            background: linear-gradient(to bottom, #ffffff, #f8f9fa);
        }

        /* Message Styles */
        .message {
            display: flex;
            gap: 12px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.own {
            justify-content: flex-end;
        }

        .message-avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary-red), var(--accent-orange));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 14px;
            flex-shrink: 0;
        }

        .message-bubble {
            background: white;
            border-radius: 15px;
            padding: 12px 16px;
            max-width: 70%;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            border: 1px solid var(--light-grey);
        }

        .message.own .message-bubble {
            background: linear-gradient(135deg, var(--primary-red), #A01029);
            color: white;
            border: none;
        }

        .message-content {
            word-break: break-word;
            font-size: 14px;
            line-height: 1.4;
        }

        .message-name {
            font-weight: 600;
            font-size: 13px;
            color: var(--primary-red);
            margin-bottom: 4px;
        }

        .message.own .message-name {
            color: rgba(255, 255, 255, 0.8);
            text-align: right;
        }

        .message-time {
            font-size: 11px;
            color: var(--text-light);
            margin-top: 4px;
            text-align: right;
        }

        .message.own .message-time {
            color: rgba(255, 255, 255, 0.7);
            text-align: right;
        }

        /* System Messages */
        .system-message {
            text-align: center;
            color: var(--text-light);
            font-size: 12px;
            padding: 15px;
            margin: 10px 0;
            opacity: 0.7;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Input Area */
        .chat-input-area {
            background: white;
            border-top: 1px solid var(--border-color);
            padding: 15px 20px;
            display: flex;
            gap: 10px;
            align-items: flex-end;
            position: sticky;
            bottom: 0;
            box-shadow: 0 -4px 15px rgba(0, 0, 0, 0.05);
        }

        .chat-input-field {
            flex: 1;
            display: flex;
            align-items: center;
            background: #f8f9fa;
            border: 1px solid var(--border-color);
            border-radius: 25px;
            padding: 10px 16px;
            gap: 10px;
        }

        .chat-input-field input {
            flex: 1;
            border: none;
            background: none;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            outline: none;
        }

        .chat-input-field input::placeholder {
            color: #bbb;
        }

        .chat-input-icon {
            color: var(--text-light);
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s ease;
        }

        .chat-input-icon:hover {
            color: var(--primary-red);
            transform: scale(1.1);
        }

        .chat-send-btn {
            background: linear-gradient(135deg, var(--primary-red), #A01029);
            color: white;
            border: none;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(196, 30, 58, 0.3);
        }

        .chat-send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 16px rgba(196, 30, 58, 0.4);
        }

        .chat-send-btn:active {
            transform: scale(0.95);
        }

        .chat-send-btn.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Typing Indicator */
        .typing-indicator {
            display: flex;
            gap: 4px;
            align-items: center;
            color: var(--text-light);
            font-size: 12px;
            padding: 10px 15px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--primary-red);
            animation: typingBounce 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typingBounce {
            0%, 60%, 100% {
                transform: translateY(0);
                opacity: 0.5;
            }
            30% {
                transform: translateY(-10px);
                opacity: 1;
            }
        }

        /* Info Banner */
        .chat-info {
            background: rgba(196, 30, 58, 0.1);
            border-left: 4px solid var(--primary-red);
            padding: 12px 16px;
            margin-bottom: 15px;
            border-radius: 6px;
            color: #C41E3A;
            font-size: 13px;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .messages-container {
                padding: 15px;
            }

            .message-bubble {
                max-width: 85%;
            }

            .chat-input-area {
                padding: 12px 15px;
            }
        }

        /* Loading State */
        .loading {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-light);
        }

        .spinner {
            width: 30px;
            height: 30px;
            border: 3px solid rgba(196, 30, 58, 0.2);
            border-top-color: var(--primary-red);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <!-- Header -->
        <div class="chat-header">
            <div class="chat-header-back" onclick="history.back()">
                <i class="fas fa-arrow-left"></i>
            </div>
            <div class="chat-header-title">
                <h2>Global Batch Chat</h2>
                <div class="chat-header-subtitle">Class of '26 • <span id="onlineCount">0</span> online</div>
            </div>
        </div>

        <!-- Info Banner -->
        <div class="chat-info">
            <i class="fas fa-info-circle"></i> Messages in this chat are permanent. Be respectful!
        </div>

        <!-- Messages Container -->
        <div class="messages-container" id="messagesContainer">
            <div class="loading">
                <div class="spinner"></div>
                <p>Loading messages...</p>
            </div>
        </div>

        <!-- Typing Indicator -->
        <div id="typingIndicator" style="display: none; padding: 10px 20px;">
            <div style="font-size: 12px; color: var(--text-light); margin-bottom: 8px;">Someone is typing...</div>
            <div class="typing-indicator">
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="chat-input-area">
            <div class="chat-input-field">
                <input 
                    type="text" 
                    id="messageInput" 
                    placeholder="Type a message..." 
                    autocomplete="off"
                >
                <i class="chat-input-icon fas fa-smile" onclick="insertEmoji()"></i>
                <i class="chat-input-icon fas fa-image" onclick="uploadMedia()"></i>
            </div>
            <button class="chat-send-btn" id="sendBtn" onclick="sendMessage()">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <!-- Firebase Scripts -->
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js"></script>
    <script src="config/firebase-config.js"></script>

    <script>
        const messagesContainer = document.getElementById('messagesContainer');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        let currentUser = null;
        let currentUserProfile = null;

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            checkAuth();
            loadMessages();
            messageInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
        });

        // Check Authentication
        function checkAuth() {
            auth.onAuthStateChanged(async (user) => {
                if (user) {
                    currentUser = user;
                    currentUserProfile = await getUserProfile(user.uid);
                } else {
                    window.location.href = 'index.html';
                }
            });
        }

        // Load Messages
        function loadMessages() {
            db.ref('chat/global/messages')
                .orderByChild('timestamp')
                .limitToLast(50)
                .on('child_added', (snapshot) => {
                    const message = snapshot.val();
                    displayMessage(message, snapshot.key);
                });
        }

        // Display Message
        function displayMessage(messageData, messageId) {
            const isOwnMessage = currentUser && messageData.uid === currentUser.uid;
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isOwnMessage ? 'own' : ''}`;
            messageDiv.id = messageId;

            const time = new Date(messageData.timestamp).toLocaleTimeString([], {
                hour: '2-digit',
                minute: '2-digit'
            });

            const initials = messageData.displayName.split(' ').map(n => n[0]).join('').toUpperCase();

            messageDiv.innerHTML = `
                ${!isOwnMessage ? `<div class="message-avatar">${initials}</div>` : ''}
                <div class="message-bubble">
                    ${!isOwnMessage ? `<div class="message-name">${messageData.displayName}</div>` : ''}
                    <div class="message-content">${escapeHtml(messageData.message)}</div>
                    <div class="message-time">${time}</div>
                </div>
            `;

            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // Send Message
        async function sendMessage() {
            const text = messageInput.value.trim();

            if (!text) {
                return;
            }

            sendBtn.disabled = true;
            sendBtn.classList.add('disabled');

            try {
                await sendChatMessage(text);
                messageInput.value = '';
            } catch (error) {
                console.error('Error:', error);
                alert('Failed to send message');
            } finally {
                sendBtn.disabled = false;
                sendBtn.classList.remove('disabled');
            }
        }

        // Helper Functions
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function insertEmoji() {
            alert('Emoji picker coming soon!');
        }

        function uploadMedia() {
            alert('Media upload coming soon!');
        }
    </script>
</body>
</html>
